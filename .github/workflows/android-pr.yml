name: Android PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          pattern='^(feat|fix|refactor|docs|ci|build|chore|perf|test|revert)(\([^)]+\))?!?: .+'
          if ! printf '%s\n' "$PR_TITLE" | grep -Eq "$pattern"; then
            echo "PR title must follow Conventional Commits, for example: feat: add Drive sync"
            exit 1
          fi

  build-and-test:
    needs: validate-pr-title
    if: always() && (github.event_name != 'pull_request' || needs.validate-pr-title.result == 'success')
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create .env.firebase
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$FIREBASE_WEB_API_KEY"
          printf 'FIREBASE_WEB_API_KEY=%s\n' "$FIREBASE_WEB_API_KEY" > .env.firebase

      - name: Render google-services.json from .env.firebase
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          env = {}
          for raw_line in Path(".env.firebase").read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#"):
                  continue
              if "=" not in line:
                  raise SystemExit(f"Invalid .env.firebase entry: {raw_line}")
              key, value = line.split("=", 1)
              env[key] = value

          config_path = Path("app/google-services.json")
          template = config_path.read_text(encoding="utf-8")

          def replace(match: re.Match[str]) -> str:
              key = match.group(1)
              value = env.get(key)
              if not value:
                  raise SystemExit(f"Missing required variable in .env.firebase: {key}")
              return value

          rendered = re.sub(r"\$\{([A-Z0-9_]+)\}", replace, template)
          if re.search(r"\$\{[A-Z0-9_]+\}", rendered):
              raise SystemExit("Unresolved placeholders remain in app/google-services.json")
          config_path.write_text(rendered, encoding="utf-8")
          PY

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          test -n "$DEBUG_KEYSTORE_BASE64"
          echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > debug.keystore

      - name: Create signing.properties
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: |
          test -n "$DEBUG_KEYSTORE_PASSWORD"
          test -n "$DEBUG_KEY_ALIAS"
          test -n "$DEBUG_KEY_PASSWORD"
          cat > signing.properties <<EOF
          debugStoreFile=debug.keystore
          debugStorePassword=$DEBUG_KEYSTORE_PASSWORD
          debugKeyAlias=$DEBUG_KEY_ALIAS
          debugKeyPassword=$DEBUG_KEY_PASSWORD
          EOF

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zvaka-debug-apk
          if-no-files-found: error
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/output-metadata.json
