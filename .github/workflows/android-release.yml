name: Android Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Semantic version bump to apply
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      tracks:
        description: Comma-separated Google Play tracks
        required: true
        default: internal
        type: string

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          submodules: recursive

      - name: Compute release version
        id: version
        run: |
          set -euo pipefail
          latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$latest_tag" ]; then
            base_version="0.1.0"
          else
            base_version="${latest_tag#v}"
          fi

          IFS='.' read -r major minor patch <<EOF
          $base_version
          EOF

          selected_bump="${{ inputs.bump_type }}"
          if [ "$selected_bump" = "auto" ]; then
            if [ -n "$latest_tag" ]; then
              commit_messages=$(git log --format=%s%n%b "${latest_tag}..HEAD")
            else
              commit_messages=$(git log --format=%s%n%b)
            fi

            if printf '%s\n' "$commit_messages" | rg -q 'BREAKING CHANGE|^[^[:space:]]+(\([^)]+\))?!:'; then
              selected_bump="major"
            elif printf '%s\n' "$commit_messages" | rg -q '^feat(\([^)]+\))?:'; then
              selected_bump="minor"
            else
              selected_bump="patch"
            fi
          fi

          case "$selected_bump" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
          esac

          version_name="${major}.${minor}.${patch}"
          version_tag="v${version_name}"
          version_code=$((major * 10000 + minor * 100 + patch))

          {
            echo "selected_bump=$selected_bump"
            echo "version_name=$version_name"
            echo "version_tag=$version_tag"
            echo "version_code=$version_code"
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Render google-services.json
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$FIREBASE_WEB_API_KEY"
          envsubst '$FIREBASE_WEB_API_KEY' < app/google-services.json.template > app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Create signing.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          cat > signing.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: projects/1086833593805/locations/global/workloadIdentityPools/github/providers/my-repo
          service_account: github-releaser@opportune-chess-492418-r5.iam.gserviceaccount.com

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build release bundle and APK
        env:
          MODEL_IMPROVEMENT_API_BASE_URL: ${{ secrets.MODEL_IMPROVEMENT_API_BASE_URL }}
          MODEL_IMPROVEMENT_CLOUD_PROJECT_NUMBER: ${{ secrets.MODEL_IMPROVEMENT_CLOUD_PROJECT_NUMBER }}
        run: |
          ./gradlew \
            -PappVersionCode=${{ steps.version.outputs.version_code }} \
            -PappVersionName=${{ steps.version.outputs.version_name }} \
            bundleRelease assembleRelease --no-daemon

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zvaka-release-${{ steps.version.outputs.version_tag }}
          if-no-files-found: error
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/mapping/release/mapping.txt
            android/app/build/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib

      - name: Create and publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.version_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/mapping/release/mapping.txt

      - name: Upload to Google Play tracks
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.dreef3.weightlossapp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          mappingFile: android/app/build/outputs/mapping/release/mapping.txt
          debugSymbols: android/app/build/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib
          track: ${{ inputs.tracks }}
