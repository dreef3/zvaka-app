name: Android Play Upload Debug

on:
  workflow_dispatch:
    inputs:
      tracks:
        description: Comma-separated Google Play tracks
        required: true
        default: qa
        type: string
      version_code:
        description: Optional explicit version code override
        required: false
        default: ""
        type: string
      version_name:
        description: Optional explicit version name override
        required: false
        default: ""
        type: string

concurrency:
  group: android-play-upload-debug-${{ github.ref }}
  cancel-in-progress: false

jobs:
  play-upload-debug:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          submodules: recursive

      - name: Compute debug release version
        id: version
        run: |
          set -euo pipefail
          latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$latest_tag" ]; then
            base_version="0.1.0"
          else
            base_version="${latest_tag#v}"
          fi

          IFS='.' read -r major minor patch <<EOF
          $base_version
          EOF

          default_version_name="${major}.${minor}.$((patch + 1))-debug"
          default_version_code=$((major * 10000 + minor * 100 + patch + 1))

          version_name="${{ inputs.version_name }}"
          version_code="${{ inputs.version_code }}"

          if [ -z "$version_name" ]; then
            version_name="$default_version_name"
          fi
          if [ -z "$version_code" ]; then
            version_code="$default_version_code"
          fi

          {
            echo "version_name=$version_name"
            echo "version_code=$version_code"
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Create signing.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          cat > signing.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: projects/1086833593805/locations/global/workloadIdentityPools/github/providers/my-repo
          service_account: github-releaser@opportune-chess-492418-r5.iam.gserviceaccount.com

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build release bundle and APK
        run: |
          ./gradlew \
            -PappVersionCode=${{ steps.version.outputs.version_code }} \
            -PappVersionName=${{ steps.version.outputs.version_name }} \
            bundleRelease assembleRelease --no-daemon

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zvaka-play-upload-debug-${{ github.run_id }}
          if-no-files-found: error
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/mapping/release/mapping.txt

      - name: Upload to Google Play tracks
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.dreef3.weightlossapp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          mappingFile: android/app/build/outputs/mapping/release/mapping.txt
          tracks: ${{ inputs.tracks }}
