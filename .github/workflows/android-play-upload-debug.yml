name: Android Play Upload Debug

on:
  workflow_dispatch:
    inputs:
      tracks:
        description: Comma-separated Google Play tracks
        required: true
        default: qa
        type: string
      release_tag:
        description: Optional GitHub release tag to use instead of the latest release
        required: false
        default: ""
        type: string

concurrency:
  group: android-play-upload-debug-${{ github.ref }}
  cancel-in-progress: false

jobs:
  play-upload-debug:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Resolve GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -n "$RELEASE_TAG" ]; then
            release_json=$(gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json tagName)
          else
            release_json=$(gh release view --repo "$GH_REPO" --json tagName)
          fi
          tag_name=$(printf '%s' "$release_json" | jq -r '.tagName')
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "$TAG_NAME" --repo "$GH_REPO" \
            --pattern 'app-release.aab' \
            --pattern 'mapping.txt' \
            --dir release-assets

      - name: Upload downloaded assets
        uses: actions/upload-artifact@v4
        with:
          name: zvaka-play-upload-debug-${{ github.run_id }}
          if-no-files-found: error
          path: |
            release-assets/app-release.aab
            release-assets/mapping.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: projects/1086833593805/locations/global/workloadIdentityPools/github/providers/my-repo
          service_account: github-releaser@opportune-chess-492418-r5.iam.gserviceaccount.com

      - name: Upload to Google Play tracks
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.dreef3.weightlossapp
          releaseFiles: release-assets/app-release.aab
          mappingFile: release-assets/mapping.txt
          tracks: ${{ inputs.tracks }}
