name: Android Gemma Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_real_model:
        description: Run real LiteRT/Gemma smoke checks
        required: true
        default: true
        type: boolean

jobs:
  gemma-smoke:
    if: |
      github.event_name == 'workflow_dispatch' && inputs.run_real_model == true ||
      github.event_name != 'workflow_dispatch' && vars.ENABLE_GEMMA_SMOKE == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Render google-services.json
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$FIREBASE_WEB_API_KEY"
          envsubst '$FIREBASE_WEB_API_KEY' < app/google-services.json.template > app/google-services.json

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          test -n "$DEBUG_KEYSTORE_BASE64"
          echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > debug.keystore

      - name: Create signing.properties
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: |
          test -n "$DEBUG_KEYSTORE_PASSWORD"
          test -n "$DEBUG_KEY_ALIAS"
          test -n "$DEBUG_KEY_PASSWORD"
          cat > signing.properties <<EOF
          debugStoreFile=debug.keystore
          debugStorePassword=$DEBUG_KEYSTORE_PASSWORD
          debugKeyAlias=$DEBUG_KEY_ALIAS
          debugKeyPassword=$DEBUG_KEY_PASSWORD
          EOF

      - name: Download Gemma model
        run: |
          mkdir -p app/build/test-models
          curl -L --fail --retry 3 \
            "https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm/resolve/main/gemma-4-E2B-it.litertlm?download=true" \
            -o app/build/test-models/gemma-4-E2B-it.litertlm

      - name: Run deterministic chat tests
        run: ./gradlew testDebugUnitTest --no-daemon --tests "com.dreef3.weightlossapp.chat.*" --tests "com.dreef3.weightlossapp.inference.*"

      - name: Run real-model chat smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          script: |
            ./gradlew installDebug installDebugAndroidTest --no-daemon
            adb shell run-as com.dreef3.weightlossapp.debug mkdir -p cache/models
            adb shell "run-as com.dreef3.weightlossapp.debug sh -c 'cat > cache/models/gemma-4-E2B-it.litertlm'" < app/build/test-models/gemma-4-E2B-it.litertlm
            ./gradlew connectedDebugAndroidTest --no-daemon \
              -Pandroid.testInstrumentationRunnerArguments.class=com.dreef3.weightlossapp.chat.LiteRtDietChatEngineInstrumentedSmokeTest \
              -Pandroid.testInstrumentationRunnerArguments.runRealGemmaTests=true \
              -Pandroid.testInstrumentationRunnerArguments.gemmaModelPath=/data/user/0/com.dreef3.weightlossapp.debug/cache/models/gemma-4-E2B-it.litertlm

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gemma-smoke-reports-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            android/app/build/reports/tests/testDebugUnitTest
            android/app/build/test-results/testDebugUnitTest
            android/app/build/reports/androidTests/connected
            android/app/build/outputs/androidTest-results/connected
